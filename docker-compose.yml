services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SuaSenhaForte@123"
    ports:
      - "1433:1433"

  api:
    build:
      context: .
      dockerfile: Portal.API/Dockerfile
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PortalDb;User Id=sa;Password=Senha@123;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "8080:8080"